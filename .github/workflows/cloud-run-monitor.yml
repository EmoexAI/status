name: Cloud Run Monitor
on:
  schedule:
    - cron: "*/5 * * * *"
  push:
    branches: [master]
    paths:
      - ".github/workflows/cloud-run-monitor.yml"
      - "config/cloud-run-targets.yml"
      - "scripts/check_cloud_run_health.py"
      - "scripts/check-cloud-run-health.sh"
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  id-token: write   # required for Workload Identity Federation

concurrency:
  group: cloud-run-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ vars.GCP_PROJECT }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install pyyaml

      - name: Run health checks
        env:
          GCLOUD_PROJECT: ${{ vars.GCP_PROJECT }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash scripts/check-cloud-run-health.sh
