name: Response Time CI
on:
  schedule:
    # Every 6 hours. The 7-day response time chart in status-page filters
    # commits to history/<slug>.yml with per_page: 28 (hard-coded), so 28
    # points × 6h ≈ 7 days fills the visible window without truncation.
    - cron: "0 */6 * * *"
  repository_dispatch:
    types:
      - response_time
  workflow_dispatch:
permissions:
  contents: write
  issues: write
jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: upptime/uptime-monitor@master
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        with:
          command: "response-time"
