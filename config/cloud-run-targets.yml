# Cloud Run services monitored via log inspection.
#
# Why log-based: these services don't expose a user-facing URL, so we can't
# HTTP-probe them. Instead we ask GCP Logging: in the last <window> minutes,
# did any ERROR appear AND did at least one success signal appear? Either
# failure marks the service unhealthy and opens an Upptime incident (issue).
#
# Editing this file:
#   - `success_filter` uses Cloud Logging filter syntax. Keep it as specific
#     as you can — a too-broad filter will mask real outages.
#   - `window_minutes` should be wider than the service's normal idle period.
#     Background tasks that run hourly need window ≥ 60.

project: emoex-9aa45

defaults:
  window_minutes: 15
  # How far back to look for *any* historical success before we apply the
  # short-window degradation rule. Until a service has at least one success
  # log within this lookback, it's treated as "not yet activated" and we
  # do NOT open incidents for it. (Avoids false alarms on first deploy.)
  bootstrap_window_minutes: 10080   # 7 days
  error_filter: 'severity>=ERROR'

services:
  - name: summary-task
    region: australia-southeast1
    # summary-task is scheduled hourly. A 90-minute window guarantees at
    # least one success log on the steady state even with cron jitter or
    # an occasional long run, and flags a real outage after ~1.5 missed
    # cycles. Tighten only if you confirm the cron is rock-steady.
    window_minutes: 90
    # ChatSummaryService logs a "task completed" / "submitted successfully"
    # line at the end of every successful run. If we see one within the
    # window, the cron is firing and processing OK.
    success_filter: |
      textPayload=~"task completed|submitted successfully"
